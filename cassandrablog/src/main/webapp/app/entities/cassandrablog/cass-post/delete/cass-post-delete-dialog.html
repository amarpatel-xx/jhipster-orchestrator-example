@if (cassPost) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(cassPost)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="cassPostDeleteDialogHeading" jhiTranslate="entity.delete.title">Confirm delete operation</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error></jhi-alert-error>
      <p
        id="jhi-delete-cassPost-heading"
        jhiTranslate="cassandrablogApp.cassandrablogCassPost.delete.question"
        [translateValues]="{
          createdDate: cassPost.compositeId.createdDate | convertFromDayjsToDateLong,
          addedDateTime: cassPost.compositeId.addedDateTime | convertFromDayjsToDateLong,
          postId: cassPost.compositeId.postId,
        }"
      >
        Are you sure you want to delete this CassPost?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
      </button>

      <button id="jhi-confirm-delete-cassPost" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times"></fa-icon>&nbsp;<span jhiTranslate="entity.action.delete">Delete</span>
      </button>
    </div>
  </form>
}
