@if (cassSaathratriEntity3) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(cassSaathratriEntity3)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="cassSaathratriEntity3DeleteDialogHeading" jhiTranslate="entity.delete.title">
        Confirm delete operation
      </h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error></jhi-alert-error>
      <p
        id="jhi-delete-cassSaathratriEntity3-heading"
        jhiTranslate="cassandrablogApp.cassandrablogCassSaathratriEntity3.delete.question"
        [translateValues]="{
          entityType: cassSaathratriEntity3.compositeId.entityType,
          createdTimeId: cassSaathratriEntity3.compositeId.createdTimeId,
        }"
      >
        Are you sure you want to delete this CassSaathratriEntity3?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
      </button>

      <button id="jhi-confirm-delete-cassSaathratriEntity3" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times"></fa-icon>&nbsp;<span jhiTranslate="entity.action.delete">Delete</span>
      </button>
    </div>
  </form>
}
