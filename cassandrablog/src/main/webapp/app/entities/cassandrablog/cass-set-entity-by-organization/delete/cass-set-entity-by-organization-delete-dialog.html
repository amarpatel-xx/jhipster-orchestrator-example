@if (cassSetEntityByOrganization) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(cassSetEntityByOrganization.organizationId!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="cassSetEntityByOrganizationDeleteDialogHeading" jhiTranslate="entity.delete.title">
        Confirm delete operation
      </h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error></jhi-alert-error>
      <p
        id="jhi-delete-cassSetEntityByOrganization-heading"
        jhiTranslate="cassandrablogApp.cassandrablogCassSetEntityByOrganization.delete.question"
        [translateValues]="{ id: cassSetEntityByOrganization.organizationId }"
      >
        Are you sure you want to delete Cass Set Entity By Organization {{ cassSetEntityByOrganization.organizationId }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
      </button>

      <button id="jhi-confirm-delete-cassSetEntityByOrganization" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times"></fa-icon>&nbsp;<span jhiTranslate="entity.action.delete">Delete</span>
      </button>
    </div>
  </form>
}
