# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
name: cassandrastore
services:
  app:
    image: cassandrastore
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod,api-docs,secret-samples
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://admin:$${jhipster.registry.password}@jhipster-registry:8761/eureka
      - SPRING_CLOUD_CONFIG_URI=http://admin:$${jhipster.registry.password}@jhipster-registry:8761/config
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_OIDC_ISSUER_URI=http://keycloak:9080/realms/jhipster
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_ID=internal
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_OIDC_CLIENT_SECRET=internal
      - SPRING_CASSANDRA_CONTACTPOINTS=cassandra
      - JHIPSTER_SLEEP=10
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8084; printf \"GET
          /management/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3;
          grep -q \"\\\"status\\\":\\\"UP\\\"\" <&3'"
      interval: 5s
      timeout: 5s
      retries: 40
    depends_on:
      cassandra:
        condition: service_healthy
      cassandra-migration:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      jhipster-registry:
        condition: service_healthy
  cassandra:
    extends:
      file: ./cassandra.yml
      service: cassandra
  cassandra-migration:
    extends:
      file: ./cassandra.yml
      service: cassandra-migration
  keycloak:
    extends:
      file: ./keycloak.yml
      service: keycloak
  jhipster-registry:
    extends:
      file: ./jhipster-registry.yml
      service: jhipster-registry
    depends_on:
      keycloak:
        condition: service_healthy
