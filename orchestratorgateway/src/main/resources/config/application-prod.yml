# ===================================================================
# Spring Boot configuration for the "prod" profile.
#
# This configuration overrides the application.yml file.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# https://docs.spring.io/spring-boot/appendix/application-properties/index.html
# ===================================================================

logging:
  level:
    ROOT: INFO
    tech.jhipster: INFO
    com.saathratri.developer.gateway: INFO

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://admin:${jhipster.registry.password}@localhost:8761/eureka/

management:
  prometheus:
    metrics:
      export:
        enabled: false
  zipkin: # Use the "zipkin" Maven profile to have the Spring Cloud Zipkin dependencies
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0 # report 100% of traces

spring:
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  cloud:
    config:
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 100
      # --- SAATHRATRI CHANGE: Point to GitHub-hosted config repo instead of local registry ---
      uri: https://github.com/jhipster/jhipster-registry-sample-config
      # --- END SAATHRATRI CHANGE ---
      # name of the config server's property source (file.yml) that we want to use
      name: orchestratorgateway
      profile: prod
      label: main # toggle to switch to a different version of the configuration as stored in git
      # it can be set to any label, branch or commit of the configuration source Git repository
  # Replace by 'prod, faker' to add the faker context and have sample data loaded in production
  # --- SAATHRATRI CHANGE: Additional Heroku deployment context ---
  # This defines the JDBC URL for the PostgreSQL database that Liquibase should connect to when applying migrations.
  # This is required to properly deploy on Heroku.
  # --- END SAATHRATRI CHANGE ---
  liquibase:
    contexts: prod
    url: jdbc:postgresql://localhost:5432/orchestratorgateway
  r2dbc:
    # --- SAATHRATRI CHANGE: Externalize R2DBC PostgreSQL credentials via env vars ---
    url: ${R2DBC_DATABASE_URL_ORCHESTRATORGATEWAY_PROD}
    username: ${R2DBC_DATABASE_USERNAME_ORCHESTRATORGATEWAY_PROD}
    password: ${R2DBC_DATABASE_PASSWORD_ORCHESTRATORGATEWAY_PROD}
  # --- END SAATHRATRI CHANGE ---
  thymeleaf:
    cache: true
  # --- SAATHRATRI CHANGE: Auth0 OIDC provider and registration for production ---
  security:
    oauth2:
      client:
        provider:
          oidc:
            # issuer-uri: http://localhost:9080/realms/jhipster
            # make sure to include the ending slash!
            issuer-uri: https://${AUTH0_DOMAIN}/
        registration:
          oidc:
            # client-id: web_app
            # client-secret: web_app
            client-id: ${AUTH0_OAUTH2_CLIENT_ID_WEB}
            client-secret: ${AUTH0_OAUTH2_CLIENT_SECRET_WEB}
            scope: openid, profile, email, offline_access # last one for refresh tokens
# --- END SAATHRATRI CHANGE ---

# ===================================================================
# To enable TLS in production, generate a certificate using:
# keytool -genkey -alias orchestratorgateway -storetype PKCS12 -keyalg RSA -keysize 2048 -keystore keystore.p12 -validity 3650
#
# You can also use Let's Encrypt:
# See details in topic "Create a Java Keystore (.JKS) from Let's Encrypt Certificates" on https://maximilian-boehm.com/en-gb/blog
#
# Then, modify the server.ssl properties so your "server" configuration looks like:
#
# server:
#   port: 443
#   ssl:
#     key-store: classpath:config/tls/keystore.p12
#     key-store-password: password
#     key-store-type: PKCS12
#     key-alias: selfsigned
#     # The ciphers suite enforce the security by deactivating some old and deprecated SSL cipher, this list was tested against SSL Labs (https://www.ssllabs.com/ssltest/)
#     ciphers: TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 ,TLS_DHE_RSA_WITH_AES_128_GCM_SHA256 ,TLS_DHE_RSA_WITH_AES_256_GCM_SHA384 ,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA384,TLS_DHE_RSA_WITH_AES_128_CBC_SHA256,TLS_DHE_RSA_WITH_AES_128_CBC_SHA,TLS_DHE_RSA_WITH_AES_256_CBC_SHA256,TLS_DHE_RSA_WITH_AES_256_CBC_SHA,TLS_RSA_WITH_AES_128_GCM_SHA256,TLS_RSA_WITH_AES_256_GCM_SHA384,TLS_RSA_WITH_AES_128_CBC_SHA256,TLS_RSA_WITH_AES_256_CBC_SHA256,TLS_RSA_WITH_AES_128_CBC_SHA,TLS_RSA_WITH_AES_256_CBC_SHA,TLS_DHE_RSA_WITH_CAMELLIA_256_CBC_SHA,TLS_RSA_WITH_CAMELLIA_256_CBC_SHA,TLS_DHE_RSA_WITH_CAMELLIA_128_CBC_SHA,TLS_RSA_WITH_CAMELLIA_128_CBC_SHA
# ===================================================================
server:
  port: 8080
  shutdown: graceful # see https://docs.spring.io/spring-boot/reference/web/graceful-shutdown.html#web.graceful-shutdown
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================

jhipster:
  # --- SAATHRATRI CHANGE: Enable CORS in production with env var allowed origins ---
  cors:
    allowed-origins: '${ALLOWED_ORIGINS_ALL_MICROSERVICES_INCLUDING_GATEWAY}'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count'
    allow-credentials: true
    max-age: 1800
  # --- END SAATHRATRI CHANGE ---
  http:
    cache: # Used by the CachingHttpHeadersFilter
      timeToLiveInDays: 1461
  # --- SAATHRATRI CHANGE: Commented-out Eureka registry password env var ---
  # registry:
  # password: ${EUREKA_JHIPSTER_REGISTRY_PASSWORD_PROD}
  # --- END SAATHRATRI CHANGE ---
  # --- SAATHRATRI CHANGE: Session-based remember-me key ---
  # --- END SAATHRATRI CHANGE ---
  logging:
    use-json-format: false # By default, logs are not in Json format
    logstash: # Forward logs to logstash over a socket, used by LoggingConfiguration
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512

  # --- SAATHRATRI CHANGE: Auth0 OAuth2 audience with Azure API Management ---
  security:
    oauth2:
      audience:
        # - account
        # - api://default
        - https://${AUTH0_DOMAIN}/api/v2/
# --- END SAATHRATRI CHANGE ---

